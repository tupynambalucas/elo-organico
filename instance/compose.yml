name: elo-instance

services:
  instance-db:
    build:
      context: ./infrastructure/mongodb
      dockerfile: Dockerfile
    container_name: elo-instance-db
    restart: always
    ports:
      - '27017:27017'
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/data/mongo-keyfile']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - elo-instance-mongo-data:/data/db
    networks:
      - elo-instance-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  instance-db-seed:
    build:
      context: ./infrastructure/mongodb
      dockerfile: Dockerfile
    container_name: elo-instance-db-seed
    # Sobrescreve o entrypoint para rodar o script de seed
    entrypoint: ["./seed.sh"]
    depends_on:
      instance-db:
        condition: service_healthy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
      ADMIN_USER_SEED: ${ADMIN_USER_SEED}
      ADMIN_EMAIL_SEED: ${ADMIN_EMAIL_SEED}
      ADMIN_PASS_SEED: ${ADMIN_PASS_SEED}
    networks:
      - elo-instance-network

  instance-redis:
    build:
      context: ./infrastructure/redis
      dockerfile: Dockerfile
    container_name: elo-instance-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - elo-instance-redis-data:/data
    networks:
      - elo-instance-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  elo-instance-network:
    driver: bridge

volumes:
  elo-instance-mongo-data:
  elo-instance-redis-data:
