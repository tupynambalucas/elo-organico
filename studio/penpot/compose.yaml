name: elo-penpot

networks:
  penpot-net:

services:
  frontend:
    build:
      context: ./infrastructure/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '9005:8080'
    env_file:
      - .env
      - config/.env.frontend
    depends_on:
      - backend
      - exporter
    networks:
      - penpot-net
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'elo.internal:host-gateway'

  backend:
    build:
      context: ./infrastructure/backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - penpot-net
    env_file:
      - .env
      - config/.env.backend
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'elo.internal:host-gateway'

  exporter:
    build:
      context: ./infrastructure/exporter
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
      - config/.env.exporter
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - penpot-net
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'elo.internal:host-gateway'

  valkey:
    build:
      context: ./infrastructure/valkey
      dockerfile: Dockerfile
    restart: always
    volumes:
      - penpot_valkey_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'valkey-cli ping | grep PONG']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - penpot-net

  aide:
    build:
      context: ./infrastructure/aide
      dockerfile: Dockerfile
    restart: no
    env_file:
      - ./config/.env.aide
    ports:
      - '4400:4400'
      - '4401:4401'
      - '4402:4402'
      - '4403:4403'
    networks:
      - penpot-net

volumes:
  penpot_frontend_data:
  penpot_valkey_data:
